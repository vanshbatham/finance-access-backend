spring:
  datasource:
    url: jdbc:h2:mem:financedb
    driverClassName: org.h2.Driver
    username: sa
    password: password

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false # Turn off SQL logging in production to save memory

  h2:
    console:
      enabled: true
      path: /h2-console